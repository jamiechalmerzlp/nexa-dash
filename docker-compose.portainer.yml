services:
  nexa-dash:
    image: jamiechalmerzlp/nexadash:latest
    container_name: nexa-dash
    restart: unless-stopped
    privileged: true
    ports:
      - "3001:3001"
    environment:
      DASHDOT_SHOW_HOST: "true"
      DASHDOT_ENABLE_CPU_TEMPS: "true"
      DASHDOT_ACCEPT_OOKLA_EULA: "true"
    volumes:
      - /:/mnt/host:ro
