name: Feature Request
description: File a feature request
title: '[Feature] '
labels: ['type: feature']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this feature request!
  - type: textarea
    id: describe-the-feature
    attributes:
      label: Description of the feature
      description: Please describe in full detail what you would like to add to Nexa Dash. Feel free to include screenshots or examples.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: If there is anything else you want to note?
